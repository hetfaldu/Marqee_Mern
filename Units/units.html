<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
    <style>
        .container {
            width: 400px;
            height: 500px;
            margin: 0 auto;
            border-radius: 20px;
            border: 2px solid #000;
            background-color: snow;
        }

        .child {
            width: 100%;
            height: 30%;
            background-color: rgb(10, 186, 245);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        div>img {
            width: 250px;
            height: 250px;
            margin: 5px 70px;
        }

        .info {
            text-align: center;
            margin-top: 80px;
        }

        p {
            font-family: Arial, Helvetica, sans-serif;
        }


        button {
            border-radius: 30px;
            background-color: rgb(10, 186, 245);
            border: none;
            color: white;
            padding: 10px 35px;
            font-size: 18px;
        }

        .social {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 20px;
            margin-top: 20px;
            margin-left: 55px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .line {
            width: 1px;
            height: 30px;
            background: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="child">
            <img src="profile.png" alt="profile_image">
        </div>
        <div class="info">
            <h2>CodingLab</h2>
            <p>YouTuber & Blogger</p>
            <div class="icons" style="margin-top: 25px;">
                <i class="fa-brands fa-facebook  fa-2xl" style="color: rgb(15, 93, 231);"></i>
                <i class="fa-brands fa-square-twitter fa-2xl" style="color: rgb(58, 159, 239);"></i>
                <i class="fa-brands fa-square-instagram fa-2xl" style="color: rgb(244, 13, 40);"></i>
                <i class="fa-brands fa-square-youtube fa-2xl" style="color: rgb(244, 13, 40);"></i>
            </div>

            <div style="margin-top: 25px;">
                <button>Subscribe</button>
                <button>Message</button>

            </div>
            <div class="social">
                <div class="item">
                    <i class="fa-regular fa-heart"></i>
                    <span>60.2k</span>
                </div>

                <div class="line"></div>

                <div class="item">
                    <i class="fa-regular fa-comment"></i>
                    <span>10k</span>
                </div>

                <div class="line"></div>

                <div class="item">
                    <i class="fa-solid fa-share"></i>
                    <span>5.5k</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
