<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td,
        th {
            border: 1px solid;
            padding: 5px;
        }

        thead {
            background-color: #bbb;
        }

        table {
            border-collapse: collapse;
        }

        tfoot {
            background-color: #ff751f;
            text-align: center;
        }
    </style>
</head>

<body>
    <table>
        <colgroup>
            <col style="background-color: rgb(12, 130, 233);"/>
            <col style="background-color: rgb(34, 213, 213);"/>
            <col style="background-color: rgb(215, 233, 12);"/>
            <col style="background-color: rgb(247, 30, 128);"/>
        </colgroup>
        <caption>This Table having Employee Salary record</caption>
        <thead>
            <tr>
                <th>Emp Code</th>
                <th>Emp Name</th>
                <th>Job Title</th>
                <th>Salary (LPA)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>911</td>
                <td>Zoya Shaikh</td>
                <td>Developer</td>
                <td>3.6</td>
            </tr>
            <tr>
                <td>912</td>
                <td>Lisa Dev</td>
                <td>Tester</td>
                <td rowspan="2">5.2</td>
            </tr>
            <tr>
                <td>913</td>
                <td>Deepak Jadeja</td>
                <td>Developer</td>
                
            </tr>
            <tr>
                <td>914</td>
                <td>Atit Yewale</td>
                <td>Digital Marketing</td>
                <td>4</td>
            </tr>
            <tr>
                <td>915</td>
                <td>Simran Rao</td>
                <td>HR</td>
                <td>5.6</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">This is a Table Footer</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
